version: '3.8'

# ─── Trading Platform — Docker Compose ───────────────────────────────────────
# Services:
#   postgres  — TimescaleDB (PostgreSQL 15 + time-series extension)
#   redis     — Cache + pub/sub message bus
#   backend   — FastAPI application
#   frontend  — React + Vite dev server
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d --build
#   docker compose exec backend poetry run python ../data/ingestion/yfinance_loader.py

services:
  # ── TimescaleDB (PostgreSQL 15 + time-series superpowers) ─────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trading_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql runs on first container start; enables TimescaleDB + creates schema
      - ./data/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading}@postgres:5432/${POSTGRES_DB:-trading_db}
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Phase 2: expose ml_engine package to Python import system
      PYTHONPATH: /
      # Phase 13: Alpaca paper-trading keys (optional — leave empty to use DB prices)
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      # Phase 17: JWT auth (optional — leave empty to disable auth)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot-reload: mount source code
      - ./data:/data            # Data ingestion scripts + model artifacts (/data/models/)
      - ./ml-engine:/ml_engine      # Phase 2: ML training/prediction package
      - ./quant-engine:/quant_engine # Phase 3: quant strategies + backtesting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --reload enables hot-reloading during development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── React Frontend (Vite dev server) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: trading_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # Anonymous volume: prevents host node_modules from overriding container's
    depends_on:
      - backend
    command: npm run dev -- --host
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
