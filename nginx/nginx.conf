# ── TradingOS nginx configuration — Phase 18 (Production) ─────────────────────
#
# Sits in front of backend (FastAPI) and frontend (Vite build).
# Handles:
#   1. Static assets from React build → /app/frontend/dist
#   2. API requests  /api/*           → backend:8000
#   3. WebSocket     /ws/*            → backend:8000 (upgrade headers)
#   4. Gzip compression for all text responses
#   5. Security headers
#
# Usage (docker-compose.prod.yml):
#   The nginx container mounts ./nginx/nginx.conf and the built frontend dist.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;

    # Gzip — compress API responses, JS, CSS, JSON
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ── Backend upstream ───────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;   # Reuse connections to reduce latency
    }

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"          always;
        add_header X-Content-Type-Options "nosniff"             always;
        add_header X-XSS-Protection       "1; mode=block"       always;
        add_header Referrer-Policy        "strict-origin"       always;

        # ── WebSocket proxy (Phase 7/8: price + alert streams) ────────────────
        # /ws/* must be matched BEFORE /api/* to avoid incorrect proxying.
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;  # Keep WS connections alive for 1 hour
        }

        # ── FastAPI API + docs ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection   "";
            proxy_set_header   Host         $host;
            proxy_set_header   X-Real-IP    $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;    # Long timeout for ML training / backtest
        }

        location /docs {
            proxy_pass http://backend/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend/redoc;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_set_header Host $host;
        }

        # ── React SPA (all other routes) ──────────────────────────────────────
        # Serve the Vite production build. All unknown paths fall back to
        # index.html so React Router handles client-side routing.
        location / {
            root       /app/frontend/dist;
            try_files  $uri $uri/ /index.html;
            expires    1h;    # Cache static assets for 1 hour in browser

            # Immutable cache for content-hashed JS/CSS chunks
            location ~* \.(js|css|woff2?|ttf|svg|png|ico)$ {
                expires    1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

    # ── Optional HTTPS redirect (uncomment when TLS is configured) ────────────
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ... (same location blocks as above)
    # }
}
