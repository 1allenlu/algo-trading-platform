[alembic]
# Path to migration scripts
script_location = alembic

# Add src to sys.path so we can import app modules in env.py
prepend_sys_path = .

version_path_separator = os

# NOTE: This URL is used only for local `alembic` CLI invocations.
# The Docker environment overrides DATABASE_URL via environment variable.
sqlalchemy.url = postgresql+asyncpg://trading:trading@localhost:5432/trading_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
